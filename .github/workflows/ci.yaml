name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

defaults:
  run:
    working-directory: ./app/src  

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/src/package-lock.json
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: app/src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/src/package-lock.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/cache@v4
        with:
          path: app/src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/src/package-lock.json') }}
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/cache@v4
        with:
          path: app/src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/src/package-lock.json') }}
    
      - name: Run tests with coverage
        id: test
        continue-on-error: true
        run: |
          npm test 2>&1 | tee coverage-output.txt
    
      - name: Parse coverage percentage
        id: coverage
        run: |
          COVERAGE=$(grep -oP 'All files\s+\|\s+\K[0-9.]+' coverage-output.txt | head -1)
          if [ -z "$COVERAGE" ]; then
            COVERAGE=$(grep -oP '\|\s+([0-9.]+)\s+\|' coverage-output.txt | tail -1 | grep -oP '[0-9.]+')
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        
    
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/src/coverage/
    
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: app/src/coverage/
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
    
      - name: Check test status
        if: steps.test.outcome == 'failure'
        run: |
          echo "Tests failed." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Check coverage threshold
        if: steps.test.outcome == 'success'
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          THRESHOLD=10
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Code coverage ${COVERAGE}% is below threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
          echo "Code coverage ${COVERAGE}% meets threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          fi

  
    

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: false
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/warehouse-api:${{ github.sha }}

  docker-push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/warehouse-api:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/warehouse-api:latest
  integration-test:
      runs-on: ubuntu-latest
      needs: [lint, test]
      working-directory: ./app
      if: github.event_name == 'pull_request'
      steps:
        - uses: actions/checkout@v4

        - name: Create .env file for CI
          run: |
            cat > .env <<EOF
            PORT=3000
            NODE_ENV=test
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=warehouse
            DB_USER=admin
            DB_PASSWORD=securepassword
            EOF

        - name: Start containers with docker-compose
          run: |
            docker-compose up -d --build

        - name: Wait for app to be ready
          run: |
            for i in {1..30}; do
              if curl -s -f http://localhost:3000/health; then
                echo "App is ready"
                exit 0
              fi
              sleep 2
            done
            echo "App did not become ready"
            docker-compose logs
            exit 1

        - name: Test GET /api/products
          run: curl -s -f http://localhost:3000/api/products || exit 1

        - name: Test POST /api/products
          run: |
            curl -X POST http://localhost:3000/api/products \
              -H "Content-Type: application/json" \
              -d '{"name":"Integration Product","category_id":1,"sku":"INT-001","quantity":10,"min_quantity":5,"price":99.99}' \
              -f

        - name: Test GET /api/categories
          run: curl -s -f http://localhost:3000/api/categories || exit 1

        - name: Test GET /api/analytics
          run: curl -s -f http://localhost:3000/api/analytics || exit 1

        - name: Stop containers
          if: always()
          run: docker-compose down -v