name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

defaults:
  run:
    working-directory: ./app/src  

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/src/package-lock.json
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: app/src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/src/package-lock.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/cache@v4
        with:
          path: app/src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/src/package-lock.json') }}
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/cache@v4
        with:
          path: app/src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/src/package-lock.json') }}
    
      - name: Run tests with coverage
        id: test
        continue-on-error: true
        run: |
          npm test 2>&1 | tee coverage-output.txt
    
      - name: Parse coverage percentage
        id: coverage
        run: |
          COVERAGE=$(grep -oP 'All files\s+\|\s+\K[0-9.]+' coverage-output.txt | head -1)
          if [ -z "$COVERAGE" ]; then
            COVERAGE=$(grep -oP '\|\s+([0-9.]+)\s+\|' coverage-output.txt | tail -1 | grep -oP '[0-9.]+')
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        
    
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/src/coverage/
    
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: app/src/coverage/
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
    
      - name: Check test status
        if: steps.test.outcome == 'failure'
        run: |
          echo "Tests failed. Code coverage: ${COVERAGE}% (below threshold 50%)" >> $GITHUB_STEP_SUMMARY
          exit 1
      - name: Check coverage threshold
        if: steps.test.outcome == 'success'
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          THRESHOLD=50
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Code coverage ${COVERAGE}% is below threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
          echo "Code coverage ${COVERAGE}% meets threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          fi
    

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: false
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/warehouse-api:${{ github.sha }}

  docker-push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/warehouse-api:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/warehouse-api:latest